<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#081223">
  <title>Thank you | SELYVO</title>
  <link rel="icon" type="image/png" href="assets/selyvo-dark.png">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#081223;--surface:#102146;--text:#fff;--muted:#b5c1d8;--orange:#ff8d1f;--orange2:#ffb258}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;font-family:'Satoshi',Inter,system-ui,-apple-system,'Segoe UI',sans-serif;background:radial-gradient(circle at 20% 15%,rgba(90,129,255,.22),transparent 30%),radial-gradient(circle at 82% 18%,rgba(255,141,31,.20),transparent 28%),linear-gradient(135deg,#081223,#13254a);color:var(--text)}
    main{width:min(760px,100%);text-align:center;padding:48px 34px;border:1px solid rgba(255,255,255,.12);border-radius:30px;background:rgba(255,255,255,.065);box-shadow:0 26px 80px rgba(0,0,0,.28);backdrop-filter:blur(14px)}
    .logo{width:min(320px,78%);margin:0 auto 34px}
    .mark{display:grid;place-items:center;width:72px;height:72px;margin:0 auto 22px;border-radius:22px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#17110a;font-size:34px;font-weight:900}
    h1{margin:0 0 16px;font-size:clamp(40px,7vw,68px);line-height:.98;letter-spacing:-.05em}
    p{max-width:590px;margin:0 auto;color:var(--muted);font-size:19px;line-height:1.6}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:52px;margin-top:30px;padding:0 24px;border-radius:14px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#17110a;text-decoration:none;font-weight:900;box-shadow:0 16px 38px rgba(255,141,31,.24)}
    a:focus-visible{outline:3px solid #fff;outline-offset:4px}
  </style>
</head>
<body>
  <main>
    <img class="logo" src="assets/selyvo-white.png" alt="SELYVO">
    <div class="mark" aria-hidden="true">✓</div>
    <h1>Thank you.</h1>
    <p>Your request has been submitted successfully. The SELYVO team will review your information and contact you about the most relevant product demonstration.</p>
    <a href="/">Return to the SELYVO website</a>
  </main>
</body>
</html>
